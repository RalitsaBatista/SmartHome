<!DOCTYPE html>
<html lang="en" th:lang="${#locale.language}" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title th:text="#{login.page.title}">SmartHome - Register</title>
  <link rel="stylesheet" th:href="@{/css/dashboard.css}">
</head>

<body class="bg-slate-950 text-slate-200 min-h-screen">
<div class="app">
  <aside class="sidebar">
    <div class="brand">
      <div class="brand-icon">⌂</div>
      <div>
        <h1 th:text="#{app.brand}">SmartHome</h1>
        <span th:text="#{app.subtitle}">Control Center</span>
      </div>
    </div>

    <nav class="nav">
      <nav class="nav">
        <a class="nav-item" th:href="@{/}" th:text="'🏠 ' + #{nav.dashboard}">🏠 Dashboard</a>
        <a class="nav-item" th:href="@{/lighting}" th:text="'💡 ' + #{nav.lighting}">💡 Lighting</a>
        <a class="nav-item" th:href="@{/climate}" th:text="'🌡 ' + #{nav.climate}">🌡 Climate</a>
        <a class="nav-item" th:href="@{/security}" th:text="'🔒 ' + #{nav.security}">🔒 Security</a>
        <a class="nav-item" th:href="@{/settings}" th:text="'⚙ ' + #{nav.settings}">⚙ Settings</a>
        <a class="nav-item" th:href="@{/login}" th:text="'👤 ' + #{nav.login}">👤 Login</a>

      </nav>
    </nav>
  </aside>

  <main class="main">
    <section class="content-grid register-content">
      <div class="register-wrapper">
        <!-- Brand Header -->
        <div class="register-header">
          <div class="register-icon">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M18 9v3m0 0v3m0-3h3m-3 0h-3m-2-5a4 4 0 11-8 0 4 4 0 018 0zM3 20a6 6 0 0112 0v1H3v-1z" />
            </svg>
          </div>
          <h1 class="register-title" th:text="#{register.title}">Create Account</h1>
        </div>

        <!-- Registration Card -->
        <div class="register-card">
          <form th:action="@{/register}" method="POST" class="register-form">

            <!-- Full Name -->
            <div class="form-group">
              <label th:text="#{register.label.fullname}">Full Name</label>
              <input type="text" name="fullName" required
                     class="form-input"
                     th:placeholder="#{register.placeholder.fullname}">
            </div>

            <!-- Email -->
            <div class="form-group">
              <label th:text="#{register.label.email}">Email Address</label>
              <input type="email" name="email" required
                     class="form-input"
                     placeholder="name@example.com">
            </div>

            <!-- Username -->
            <div class="form-group">
              <label th:text="#{login.label.username}">Username</label>
              <input type="text" name="username" required
                     class="form-input"
                     th:placeholder="#{login.placeholder.username}">
            </div>

            <!-- Password -->
            <div class="form-group">
              <label th:text="#{login.label.password}">Password</label>
              <input type="password" name="password" required
                     class="form-input"
                     placeholder="••••••••">
            </div>

            <!-- Terms Checkbox -->
            <div class="terms-row">
              <input type="checkbox" required class="terms-checkbox">
              <label class="terms-label">
                <span th:text="#{register.terms.accept}">I agree to the</span>
                <a href="#" th:text="#{register.terms.link}">Terms of Service</a>
              </label>
            </div>

            <button type="button"
                    onclick="window.location.href='/'"
                    class="register-submit"
                    th:text="#{register.btn.submit}">
              Create Account
            </button>
          </form>

          <div class="register-footer">
            <p>
              <span th:text="#{register.already.member}">Already have an account?</span>
              <a th:href="@{/login}" th:text="#{login.button.submit}">
                Sign In
              </a>
            </p>
          </div>
        </div>
      </div>
    </section>
  </main>
</div>
</body>
</html>

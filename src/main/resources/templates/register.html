<!DOCTYPE html>
<html lang="en" th:lang="${#locale.language}" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title th:text="#{login.page.title}">SmartHome - Register</title>
  <link rel="stylesheet" th:href="@{/css/dashboard.css}">
  <style>
    .main {
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    .content-grid.register-content {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    .register-wrapper {
      width: 100%;
      max-width: 28rem;
    }

    .register-header {
      text-align: center;
      margin-bottom: 2rem;
    }

    .register-icon {
      width: 4rem;
      height: 4rem;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 1rem;
      border-radius: 1.5rem;
      background: linear-gradient(135deg, #6366f1, #4f46e5);
      color: #ffffff;
      box-shadow: 0 18px 35px rgba(79, 70, 229, 0.28);
    }

    .register-icon svg {
      width: 2.5rem;
      height: 2.5rem;
    }

    .register-title {
      margin: 0;
      color: #ffffff;
      font-size: 1.875rem;
      font-weight: 800;
      letter-spacing: -0.035em;
    }

    .register-card {
      padding: 2rem;
      border-radius: 1.5rem;
      background: rgba(15, 23, 42, 0.72);
      border: 1px solid rgba(148, 163, 184, 0.14);
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.48);
      backdrop-filter: blur(18px) saturate(170%);
      -webkit-backdrop-filter: blur(18px) saturate(170%);
    }

    .register-form {
      display: flex;
      flex-direction: column;
      gap: 1.25rem;
    }

    .form-group label {
      display: block;
      margin-bottom: 0.4rem;
      color: #cbd5e1;
      font-size: 0.875rem;
      font-weight: 600;
    }

    .form-input {
      width: 100%;
      box-sizing: border-box;
      padding: 0.85rem 1rem;
      border-radius: 0.9rem;
      color: #ffffff;
      background: rgba(30, 41, 59, 0.72);
      border: 1px solid rgba(100, 116, 139, 0.45);
      outline: none;
      transition: border-color 0.2s ease, box-shadow 0.2s ease, background 0.2s ease;
    }

    .form-input:focus {
      background: rgba(30, 41, 59, 0.95);
      border-color: #6366f1;
      box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.16);
    }

    .form-input::placeholder {
      color: #64748b;
    }

    .terms-row {
      display: flex;
      align-items: flex-start;
      gap: 0.75rem;
      padding: 0.25rem 0;
    }

    .terms-checkbox {
      width: 1rem;
      height: 1rem;
      margin-top: 0.1rem;
      accent-color: #6366f1;
      flex-shrink: 0;
    }

    .terms-label {
      color: #94a3b8;
      font-size: 0.8rem;
      line-height: 1.45;
    }

    .terms-label a {
      color: #818cf8;
      text-decoration: none;
      font-weight: 600;
    }

    .terms-label a:hover {
      text-decoration: underline;
    }

    .register-submit {
      width: 100%;
      padding: 0.9rem 1rem;
      border: 0;
      border-radius: 0.9rem;
      color: #ffffff;
      font-weight: 700;
      cursor: pointer;
      background: linear-gradient(135deg, #6366f1 0%, #4f46e5 100%);
      box-shadow: 0 16px 28px rgba(79, 70, 229, 0.28);
      transition: transform 0.2s ease, filter 0.2s ease, box-shadow 0.2s ease;
    }

    .register-submit:hover {
      filter: brightness(1.08);
      transform: translateY(-1px);
      box-shadow: 0 20px 34px rgba(79, 70, 229, 0.34);
    }

    .register-submit:active {
      transform: scale(0.98);
    }

    .register-footer {
      margin-top: 2rem;
      padding-top: 1.5rem;
      border-top: 1px solid rgba(100, 116, 139, 0.35);
      text-align: center;
    }

    .register-footer p {
      margin: 0;
      color: #94a3b8;
      font-size: 0.875rem;
    }

    .register-footer a {
      margin-left: 0.25rem;
      color: #818cf8;
      font-weight: 700;
      text-decoration: none;
    }

    .register-footer a:hover {
      text-decoration: underline;
    }

    @media (max-width: 768px) {
      .content-grid.register-content {
        align-items: flex-start;
        padding: 1.25rem;
      }

      .register-card {
        padding: 1.5rem;
      }
    }

    @media (max-width: 480px) {
      .register-title {
        font-size: 1.6rem;
      }

      .register-card {
        border-radius: 1.25rem;
      }
    }
  </style>
</head>

<body class="bg-slate-950 text-slate-200 min-h-screen">
<div class="app">
  <aside class="sidebar">
    <div class="brand">
      <div class="brand-icon">⌂</div>
      <div>
        <h1 th:text="#{app.brand}">SmartHome</h1>
        <span th:text="#{app.subtitle}">Control Center</span>
      </div>
    </div>

    <nav class="nav">
      <nav class="nav">
        <a class="nav-item" th:href="@{/}" th:text="'🏠 ' + #{nav.dashboard}">🏠 Dashboard</a>
        <a class="nav-item" th:href="@{/lighting}" th:text="'💡 ' + #{nav.lighting}">💡 Lighting</a>
        <a class="nav-item" th:href="@{/climate}" th:text="'🌡 ' + #{nav.climate}">🌡 Climate</a>
        <a class="nav-item" th:href="@{/security}" th:text="'🔒 ' + #{nav.security}">🔒 Security</a>
        <a class="nav-item" th:href="@{/settings}" th:text="'⚙ ' + #{nav.settings}">⚙ Settings</a>
        <a class="nav-item" th:href="@{/login}" th:text="'👤 ' + #{nav.login}">👤 Login</a>

      </nav>
    </nav>
  </aside>

  <main class="main">
    <section class="content-grid register-content">
      <div class="register-wrapper">
        <!-- Brand Header -->
        <div class="register-header">
          <div class="register-icon">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M18 9v3m0 0v3m0-3h3m-3 0h-3m-2-5a4 4 0 11-8 0 4 4 0 018 0zM3 20a6 6 0 0112 0v1H3v-1z" />
            </svg>
          </div>
          <h1 class="register-title" th:text="#{register.title}">Create Account</h1>
        </div>

        <!-- Registration Card -->
        <div class="register-card">
          <form th:action="@{/register}" method="POST" class="register-form">

            <!-- Full Name -->
            <div class="form-group">
              <label th:text="#{register.label.fullname}">Full Name</label>
              <input type="text" name="fullName" required
                     class="form-input"
                     th:placeholder="#{register.placeholder.fullname}">
            </div>

            <!-- Email -->
            <div class="form-group">
              <label th:text="#{register.label.email}">Email Address</label>
              <input type="email" name="email" required
                     class="form-input"
                     placeholder="name@example.com">
            </div>

            <!-- Username -->
            <div class="form-group">
              <label th:text="#{login.label.username}">Username</label>
              <input type="text" name="username" required
                     class="form-input"
                     th:placeholder="#{login.placeholder.username}">
            </div>

            <!-- Password -->
            <div class="form-group">
              <label th:text="#{login.label.password}">Password</label>
              <input type="password" name="password" required
                     class="form-input"
                     placeholder="••••••••">
            </div>

            <!-- Terms Checkbox -->
            <div class="terms-row">
              <input type="checkbox" required class="terms-checkbox">
              <label class="terms-label">
                <span th:text="#{register.terms.accept}">I agree to the</span>
                <a href="#" th:text="#{register.terms.link}">Terms of Service</a>
              </label>
            </div>

            <button type="button"
                    onclick="window.location.href='/'"
                    class="register-submit"
                    th:text="#{register.btn.submit}">
              Create Account
            </button>
          </form>

          <div class="register-footer">
            <p>
              <span th:text="#{register.already.member}">Already have an account?</span>
              <a th:href="@{/login}" th:text="#{login.btn.submit}">
                Sign In
              </a>
            </p>
          </div>
        </div>
      </div>
    </section>
  </main>
</div>
</body>
</html>
